# General
set -g status on
set -g status-position bottom
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*256color*:smcup@:rmcup@'
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'
set -g history-limit 100000
set -g status-keys vi
setw -g mode-keys vi
set -g mouse on
set -g base-index 0
setw -g pane-base-index 0
setw -g automatic-rename on
set -g renumber-windows on
set -g set-titles on
set -g clock-mode-style 24
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
set-hook -g after-new-session "source-file ~/.dotfiles/HOME/.tmux.conf \; run-shell ~/.dotfiles/HOME/.tmux/scripts/start_brave_notes_helper.sh"

# Platform-specific shell setup
if-shell 'test "$(uname -s)" = "Darwin"' {
  set -g default-shell "/bin/zsh"

  if-shell 'command -v reattach-to-user-namespace >/dev/null 2>&1' {
    set -g default-command "reattach-to-user-namespace -l zsh"
  } {
    set -g default-command "/bin/zsh"
  }

  set -q -g status-utf8 on
  set -g @online_icon "#[fg=#50fa7b,bg=#f8f8f2]    "
  set -g @offline_icon "#[fg=#ff5555,bg=#f8f8f2]    "
}

if-shell 'test "$(uname -s)" = "Linux"' {
  set -g default-shell "/usr/bin/zsh"
  set -g default-command "/usr/bin/zsh"

  if-shell 'grep -qi microsoft /proc/version' {
    set -g @online_icon "#[fg=#50fa7b,bg=#f8f8f2]   "
    set -g @offline_icon "#[fg=#ff5555,bg=#f8f8f2]   "
  }
}

# Key bindings
bind-key & kill-window
bind-key x kill-pane
bind-key t new-window
bind-key h split-window -v -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"
bind-key -r z run-shell "~/.tmux/scripts/context_pane.sh"

# Plugin options
set -g @urlview-key 'u'
set -g @menus_trigger 'm'
set -g @tmux-weather-interval 15
set -g @tmux-weather-location "Berlin"
set -g @tmux-weather-format "%t"
set -g @tmux-weather-units "m"

# Status
set -g status-style bg=default,fg='#f8f8f2'
set -g status-interval 1
set -g status-left-length 1000
set -g status-right-length 1000
set -g message-style bg=default,fg='#f8f8f2'
set -g pane-border-style fg='#44475a'
set -g pane-active-border-style fg='#bd93f9'

set -g status-left "#[fg=#282a36,bg=#f8f8f2] #(echo 'aleksej.krueger') #{prefix_highlight}"

set -g @prefix_highlight_prefix_prompt '#[fg=default]#[bg=default]'
set -g @prefix_highlight_output_prefix '#[fg=#f8f8f2]#[bg=default]'
set -g @prefix_highlight_empty_prompt '#[fg=#f8f8f2]'
set -g @prefix_highlight_copy_prompt 'Copy'
set -g @prefix_highlight_sync_prompt 'Sync'

set -g status-right ' #[fg=#ff5555]#[fg=#282a36,bg=#ff5555]    #[fg=#ff5555,bg=#ff5555]_#[fg=#282a36,bg=#ff5555]#{battery_percentage} #[fg=#ffb86c]#[fg=#282a36,bg=#ffb86c]   #{cpu_percentage} #[fg=#f1fa8c]#[fg=#282a36,bg=#f1fa8c]  #{df_avail} #[fg=#50fa7b]#[fg=#282a36,bg=#50fa7b] #{weather} #[fg=#8be9fd]#[fg=#282a36,bg=#8be9fd]   #[fg=#8be9fd,bg=#8be9fd]_#[fg=#282a36,bg=#8be9fd]#{keyboard_layout} #[fg=#ff79c6]#[fg=#282a36,bg=#ff79c6]  #{uptime} #[fg=#6272a4]#[fg=#f8f8f2,bg=#6272a4] %a %H:%M #[fg=#f8f8f2]%Y-%m-%d #[fg=#f8f8f2]#{online_status}'

setw -g window-status-style fg='#000000',bg=default
setw -g window-status-current-style fg='#f8f8f2',bg=default
set -g window-status-current-format "#[fg=#f8f8f2,bg=default] #I #W "
set -g window-status-format "#[fg=#000000,bg=default] #I #W "

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'robhurring/tmux-uptime'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tassaron/tmux-df'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

if-shell 'test "$(uname -s)" = "Darwin"' {
  set -g @plugin 'tmux-plugins/tmux-urlview'
  set -g @plugin 'imomaliev/tmux-keyboard-layout'
}

if-shell '[ -d ~/.tmux/plugins/tpm ]' {
  run '~/.tmux/plugins/tpm/tpm'
} {
  display-message "Install TPM with: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm"
}
